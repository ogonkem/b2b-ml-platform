services:

  # ── Core Storage (PostgreSQL) ─────────────────────────────────────────────
  # Airflow metadata DB + application relational data
  postgres:
    image: postgres:15-alpine
    container_name: data-postgres
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - ./docker-data/postgres:/var/lib/postgresql/data
    networks:
      - backend-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Caching & Quota Store (Redis) ─────────────────────────────────────────
  # Tenant quota counters, auth token cache, idempotency keys
  redis:
    image: redis:7-alpine
    container_name: data-redis
    ports:
      - "6379:6379"
    networks:
      - backend-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Object Storage (MinIO) ────────────────────────────────────────────────
  # Stores: raw CSV uploads (raw-landing/) + MLflow model artefacts
  # S3 API  → http://localhost:9000
  # Console → http://localhost:9001
  minio:
    image: minio/minio:latest
    container_name: data-minio
    env_file:
      - .env
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./docker-data/minio:/data
    command: server /data --console-address ":9001"
    networks:
      - backend-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Analytics & Prediction Logs (ClickHouse) ──────────────────────────────
  # Stores every prediction event for Grafana drift/usage dashboards
  # HTTP interface → http://localhost:8123
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: analytics-clickhouse
    env_file:
      - .env
    ports:
      - "8123:8123"
    volumes:
      - clickhouse-data:/var/lib/clickhouse    # ← named volume, not bind mount
    networks:
      - backend-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 10         # ← more retries
      start_period: 30s   # ← wait 30s before first check

  # ── ML Experiment Tracking (MLflow) ───────────────────────────────────────
  # Tracks all training runs, metrics, and promotes best model to Production
  # Uses MinIO as artefact store and SQLite for run metadata
  # UI → http://localhost:5000
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: ml-mlflow
    env_file:
      - .env
    ports:
      - "5000:5000"
    command: >
      mlflow server 
      --host 0.0.0.0 
      --port 5000
      --allowed-hosts "mlflow,mlflow:5000,localhost,localhost:5000,*"
      --default-artifact-root s3://mlflow-artifacts/
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - backend-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s   # ← give MLflow 60s before first check

  # ── DAG Scheduling (Airflow) ───────────────────────────────────────────────
  # Triggers weekly retraining pipeline: dvc checkout → train → mlflow promote
  # UI → http://localhost:8080
  airflow:
    image: apache/airflow:2.7.0-python3.10
    container_name: orchestrator-airflow
    env_file:
      - .env
    ports:
      - "8080:8080"
    volumes:
      - ./airflow_dags:/opt/airflow/dags
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: standalone
    networks:
      - backend-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 20s
      timeout: 10s
      retries: 5

  # ── Inference API (FastAPI) ───────────────────────────────────────────────
  # Serves POST /v1/predict  — single real-time loan scoring
  # Serves POST /batch/upload — bulk CSV ingest
  # Swagger docs → http://localhost:8000/docs
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: selastone-api
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      # notebooks/models/ is where the notebook saves artefacts —
      # mounted read-only so the API sees them without a rebuild
      - ./notebooks/models:/models:ro
    depends_on:
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_started   # ← API can start before ClickHouse is fully healthy
    networks:
      - backend-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Observability Stack (Prometheus + Grafana) ─────────────────────────────
  # Prometheus scrapes metrics from API, Redis, and ClickHouse
  prometheus:
    image: prom/prometheus:latest
    container_name: obs-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - backend-network

  grafana:
    image: grafana/grafana:latest
    container_name: obs-grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - clickhouse
    networks:
      - backend-network

networks:
  backend-network:
    driver: bridge

volumes:
  clickhouse-data: